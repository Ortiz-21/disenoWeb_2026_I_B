<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js en el head</title>
    <script>
        base = Number(prompt("Ingrese base del rectangulo"));
        altura = Number(prompt("Ingrese altura de rectangulo"));

        area = base * altura;
        perimetro = (base + altura) * 2;

        alert("Area del rectangulo\n" + "Area: " + area + " m2\n" + "Perimetro: " + perimetro + " m");
    </script>
</head>
<body>
    <h1>Cuso de JavaScript</h1>
    <p>Calculo realizado</p>
    
</body>
</html>
